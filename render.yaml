databases:
  - name: ims-postgres
    databaseName: inventory_management
    user: ims_user

services:
  - type: web
    name: ims-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: bash render-start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ims-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://your-vercel-app.vercel.app
      - key: AUTO_SEED
        value: "true"
