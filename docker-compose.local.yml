services:
  mysql:
    image: mysql:8.0
    container_name: ims-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory_management
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ims_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ims_mysql_data:
